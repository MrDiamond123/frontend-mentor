<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | QR code component</title>
    <style>
      :root {
        --color-white: hsl(0, 0%, 100%);

        --color-slate-300: hsl(212, 45%, 89%);
        --color-slate-500: hsl(216, 15%, 48%);
        --color-slate-900: hsl(218, 44%, 22%);

        --spacing-200: 1rem;
        --spacing-300: 1.5rem;
        --spacing-500: 2.5rem;
      }

      body {
        background-color: var(--color-slate-300);
        height: 100dvh;
        margin: 0;
        font-family: "Outfit", sans-serif;
        display: flex;
        flex-direction: column;

        align-items: center;
        justify-content: center;

        gap: 0.32rem;
      }

      .container {
        background-color: var(--color-white);

        display: flex;
        flex-direction: column;
        text-align: center;

        padding: var(--spacing-200) var(--spacing-200) var(--spacing-500);
        gap: var(--spacing-300);
        border-radius: 20px;
        width: min(320px, 90vw);

        img {
          max-width: 100%;
          height: auto;
          display: block;
          
          border-radius: 10px;
        }
      }


      .text-container {
        display: flex;
        flex-direction: column;
        text-align: center;

        padding: 0 var(--spacing-200);
      }

      .text-preset-1 {
        font-weight: 700;
        font-size: 1.375rem;

        line-height: 120%;
        letter-spacing: 0px;

        color: var(--color-slate-900);
      }
      .text-preset-2 {
        font-weight: 400;
        font-size: 0.9375rem;

        line-height: 140%;
        letter-spacing: 0.2px;

        color: var(--color-slate-500);
      }

      .attribution {
        font-size: 0.6875rem;
        text-align: center;
        
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <img src="images/image-qr-code.png" alt="QR code going to frontend mentor"/>

      <section class="text-container">
        <h1 class="text-preset-1">
          Improve your front-end skills by building projects
        </h1>
        <p class="text-preset-2">
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level
        </p>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Kurtis O'Donnell</a>.
    </footer>
  </body>
</html>
